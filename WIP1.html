<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Click Something</title>

  <style>
    body {
      background: black;
      color: white;
      font-family: sans-serif;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      width: 80%;
      margin: 20px auto;
    }

    button {
      padding: 15px;
      border: none;
      background: white;
      color: black;
      cursor: pointer;
    }

    #message {
      margin-top: 20px;
      font-size: 20px;
    }
  </style>
</head>

<body>

  <h1>Click something.</h1>

  <div class="grid" id="grid"></div>
  <div id="message">...</div>

  <script>
    let grid = document.getElementById("grid");
    let message = document.getElementById("message");

    let texts = [
      "this one?", "no", "try again", "not that",
      "wrong", "keep going", "almost", "why?",
      "stop", "don't click me", "too late",
      "again", "nothing here", "??", "ok"
    ];

    let moods = [
      "leave me alone",
      "again?",
      "stop clicking",
      "ok fine...",
      "why tho",
      "bro what",
      "you serious?"
    ];

    let allButtons = [];

    // create 25 buttons
    for (let i = 0; i < 25; i++) {
      let btn = document.createElement("button");

      btn.innerText = texts[Math.floor(Math.random() * texts.length)];

      btn.addEventListener("click", () => {

        let randomMood = moods[Math.floor(Math.random() * moods.length)];
        message.innerText = randomMood;

        allButtons.forEach(b => {
          b.innerText = texts[Math.floor(Math.random() * texts.length)];
        });

        document.body.style.background =
          `rgb(${Math.random()*255}, ${Math.random()*255}, ${Math.random()*255})`;
      });

      grid.appendChild(btn);
      allButtons.push(btn);
    }
  </script>

</body>
</html>

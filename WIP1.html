<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Click Something</title>

  <style>
    body {
      background: linear-gradient(135deg, black, #111, #222);
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      transition: background 0.3s;
    }

    h1 {
      margin-top: 30px;
      letter-spacing: 2px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      width: 80%;
      margin: 30px auto;
    }

    button {
      padding: 15px;
      border: none;
      border-radius: 10px;
      background: #fff;
      color: black;
      cursor: pointer;
      font-weight: bold;
      position: relative;
      transition: 0.2s;
      box-shadow: 0 0 8px rgba(255,255,255,0.2);
    }

    button:hover {
      background: black;
      color: white;
      transform: scale(1.1);
      box-shadow: 0 0 15px white;
    }

    button:active {
      transform: scale(0.95);
    }

    #message {
      margin-top: 25px;
      font-size: 22px;
      opacity: 0.9;
      min-height: 30px;
    }
  </style>
</head>

<body>

  <h1>Click something.</h1>

  <div class="grid" id="grid"></div>
  <div id="message">...</div>

  <script>
    let grid = document.getElementById("grid");
    let message = document.getElementById("message");

    let texts = [
      "this one?", "no", "try again", "not that",
      "wrong", "keep going", "almost", "why?",
      "stop", "don't click me", "too late",
      "again", "nothing here", "??", "ok"
    ];

    let moods = [
      "leave me alone",
      "again?",
      "stop clicking",
      "ok fine...",
      "why tho",
      "bro what",
      "you serious?"
    ];

    let allButtons = [];

    for (let i = 0; i < 25; i++) {
      let btn = document.createElement("button");

      btn.innerText = texts[Math.floor(Math.random() * texts.length)];

      btn.addEventListener("click", () => {
        let currentWord = btn.innerText;

        // IF STATEMENTS (personality)
        if (currentWord === "stop") {
          message.innerText = "you were told to stop";
        } else if (currentWord === "no") {
          message.innerText = "still not the right one";
        } else if (currentWord === "almost") {
          message.innerText = "close, but not enough";
        } else if (currentWord === "don't click me") {
          message.innerText = "you clicked it anyway";
        } else {
          let randomMood = moods[Math.floor(Math.random() * moods.length)];
          message.innerText = randomMood;
        }

        // CHAOS + MOVEMENT
        allButtons.forEach(b => {
          b.innerText = texts[Math.floor(Math.random() * texts.length)];

          let moveX = Math.floor(Math.random() * 40) - 20;
          let moveY = Math.floor(Math.random() * 40) - 20;

          b.style.left = moveX + "px";
          b.style.top = moveY + "px";
        });

        // BACKGROUND CHANGE
        document.body.style.background =
          `linear-gradient(135deg,
          rgb(${Math.random()*255}, ${Math.random()*255}, ${Math.random()*255}),
          black)`;
      });

      grid.appendChild(btn);
      allButtons.push(btn);
    }
  </script>

</body>
</html>
